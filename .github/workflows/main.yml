name: Build for Win7 32-bit (Fixed Compatibility)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. 依然保持 Python 3.8 32位 (Win7 最后的版本)
    - name: Set up Python 3.8 (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10'
        architecture: 'x86'

    # 2. 核心修复：锁定旧版本，强制只安装二进制 Wheel，禁止编译
    - name: Install Dependencies
      shell: cmd
      run: |
        python -m pip install --upgrade pip
        echo 正在安装兼容 Win7 32位的预编译库...
        
        :: 先安装 numpy 和 scipy (锁定到最后提供 win32 稳定 binary 的版本)
        pip install --only-binary=:all: numpy==1.23.5
        pip install --only-binary=:all: scipy==1.9.3
        
        :: 安装 pandas 和 scikit-learn (锁定版本)
        pip install --only-binary=:all: pandas==1.5.3
        pip install --only-binary=:all: scikit-learn==1.2.2
        
        :: 安装其他不涉及复杂编译的库
        pip install requests jieba joblib pyinstaller

    # 3. 运行训练 (与之前相同)
    - name: Train AI Model
      shell: cmd
      run: |
        python train.py
        
    # 4. 编译打包 (加入 --clean 确保不冲突)
    - name: Build EXE with PyInstaller
      shell: cmd
      run: |
        pyinstaller --noconfirm --onefile --console --clean run.py
        
    # 5. 准备发布包
    - name: Prepare Release Folder
      shell: cmd
      run: |
        mkdir release_package
        copy dist\run.exe release_package\Bili_Downloader.exe
        if exist music_model.pkl copy music_model.pkl release_package\
        curl -L -o release_package\yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_x86.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Win7_32bit_Final_Build
        path: release_package\
