name: Build for Win7 32-bit (Vintage Compatibility)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.8 (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10'
        architecture: 'x86'

    - name: Install Dependencies
      shell: cmd
      run: |
        python -m pip install --upgrade pip setuptools wheel
        :: 强制安装 NumPy 1.19.3 和旧版 PyInstaller
        python -m pip install --only-binary=:all: numpy==1.19.3
        python -m pip install --only-binary=:all: scipy==1.5.4
        python -m pip install --only-binary=:all: scikit-learn==0.24.2
        python -m pip install --only-binary=:all: pandas==1.1.5
        python -m pip install requests jieba joblib
        :: 关键：回退到 PyInstaller 5.13.2，它对 Win7 兼容性极佳
        python -m pip install pyinstaller==5.13.2

    - name: Train AI Model
      shell: cmd
      run: |
        python train.py

    - name: Build EXE (Vintage Mode)
      shell: cmd
      run: |
        :: 不再使用 PyInstaller 6+ 的 _internal 文件夹
        :: 所有 DLL 会直接铺在文件夹根目录
        pyinstaller --noconfirm --onedir --console --clean ^
                    --name "Bili_Downloader" ^
                    --hidden-import sklearn.utils._cython_blas ^
                    run.py

    - name: Finalize Package
      shell: cmd
      run: |
        cd dist\Bili_Downloader
        copy ..\..\music_model.pkl .
        :: 下载 32 位 yt-dlp
        curl -L -o yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_x86.exe
        cd ..\..

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bili_Win7_32bit_Vintage
        path: dist/Bili_Downloader/
