name: Build Win7 32-bit EXE

# 触发条件：手动点击，或者代码推送到 main 分支时触发
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 拉取代码
      uses: actions/checkout@v4

    - name: 2. 设置纯净的 Python 3.8 (核心：必须是 32位 x86)
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10' # 支持 Win7 的最终经典版本
        architecture: 'x86'      # 强制 32 位

    - name: 3. 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas scikit-learn jieba joblib requests

    - name: 4. 使用 PyInstaller 打包成单个 EXE
      # -F 代表打包为单个文件，-c 代表带控制台黑框(我们需要输入互动)
      run: |
        pyinstaller -F -c run.py --name LunchSongAI

    - name: 5. 上传生成的 EXE 供你下载
      uses: actions/upload-artifact@v4
      with:
        name: LunchSongAI_Win7_32bit
        path: dist/LunchSongAI.exe
