name: Build for Win7 32-bit (Professional Folder Mode)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.8 (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10'
        architecture: 'x86'

    - name: Install Golden Combo Dependencies
      shell: cmd
      run: |
        python -m pip install --upgrade pip setuptools wheel
        :: 强制安装确定的 32位 预编译版本，避开构建地狱
        python -m pip install --only-binary=:all: numpy==1.19.5
        python -m pip install --only-binary=:all: scipy==1.5.4
        python -m pip install --only-binary=:all: scikit-learn==0.24.2
        python -m pip install --only-binary=:all: pandas==1.1.5
        python -m pip install requests jieba joblib
        :: 使用 6.x 版本的 PyInstaller 以获得 _internal 文件夹特性
        python -m pip install pyinstaller>=6.0.0

    - name: Train AI Model
      shell: cmd
      run: |
        echo 正在生成 AI 模型...
        python train.py

    - name: Build EXE with PyInstaller (Onedir Mode)
      shell: cmd
      run: |
        :: --onedir: 文件夹模式
        :: --name: 指定生成 exe 的名称
        :: PyInstaller 6+ 会自动把依赖项移入 _internal 文件夹
        pyinstaller --noconfirm --onedir --console --clean ^
                    --name "Bili_Downloader" ^
                    --hidden-import sklearn.utils._cython_blas ^
                    --hidden-import sklearn.neighbors._partition_nodes ^
                    run.py

    - name: Finalize Release Package
      shell: cmd
      run: |
        :: 1. 进入 PyInstaller 生成的目录
        cd dist\Bili_Downloader
        
        :: 2. 将 AI 模型放入主目录（和 exe 在一起）
        copy ..\..\music_model.pkl .
        
        :: 3. 下载 32 位 yt-dlp 放入主目录
        curl -L -o yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_x86.exe
        
        :: 4. 返回根目录，把整个文件夹压缩（通过 Action 上传）
        cd ..\..

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bili_Win7_32bit_Professional_Pack
        path: dist/Bili_Downloader/
