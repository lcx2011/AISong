name: Build Win7 32-bit Folder

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 拉取代码
      uses: actions/checkout@v4

    - name: 2. 设置纯净的 Python 3.8 (x86 32位)
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10'
        architecture: 'x86'

    - name: 3. 安装依赖库 (锁定兼容32位的版本)
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas jieba joblib requests
        pip install numpy==1.21.6 scipy==1.7.3 scikit-learn==1.0.2

    - name: 4. 使用 PyInstaller 打包成文件夹模式
      # 去掉了 -F，保留 -c (显示控制台)
      run: |
        pyinstaller -c --collect-all sklearn run.py --name LunchSongAI

    - name: 5. 上传生成的文件夹
      uses: actions/upload-artifact@v4
      with:
        name: LunchSongAI_Win7_32bit_Folder
        # 核心修改：这里指向整个目录路径
        path: dist/LunchSongAI/
