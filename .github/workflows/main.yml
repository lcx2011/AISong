name: Build for Win7 32-bit (Clean Professional Mode)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.8 (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10'
        architecture: 'x86'

    - name: Install Dependencies
      shell: cmd
      run: |
        python -m pip install --upgrade pip setuptools wheel
        :: 保持之前成功的黄金版本组合
        python -m pip install --only-binary=:all: numpy==1.19.5
        python -m pip install --only-binary=:all: scipy==1.5.4
        python -m pip install --only-binary=:all: scikit-learn==0.24.2
        python -m pip install --only-binary=:all: pandas==1.1.5
        
        python -m pip install requests jieba joblib threadpoolctl
        :: 升级到 6.x 版本以使用 --contents-directory 功能
        python -m pip install pyinstaller>=6.0.0

    - name: Train AI Model
      shell: cmd
      run: |
        python train.py
        
    - name: Build EXE (Clean Mode)
      shell: cmd
      run: |
        :: 核心修改点：
        :: 1. 使用 --contents-directory _internal 将依赖全部放入该子文件夹
        :: 2. 依然保留你成功的 --collect-all sklearn 参数
        pyinstaller --noconfirm --onedir --console --clean ^
                    --contents-directory _internal ^
                    --collect-all sklearn ^
                    --name "Bili_Downloader" ^
                    run.py

    - name: Prepare Release Package
      shell: cmd
      run: |
        :: 进入 PyInstaller 生成的目录
        cd dist\Bili_Downloader
        
        :: 1. 将训练好的模型放入主目录（和 exe 在一起）
        copy ..\..\music_model.pkl .
        
        :: 2. 下载 32 位专用的 yt-dlp 放入主目录
        curl -L -o yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_x86.exe
        
        :: 检查一下现在的结构
        echo 打包完成，结构预览：
        dir
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bili_Downloader_Clean_Win7
        path: dist/Bili_Downloader/
