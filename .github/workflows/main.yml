name: Build for Win7 32-bit (Verified x86 Wheels)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.8 (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10'
        architecture: 'x86'

    - name: Install Dependencies
      shell: cmd
      run: |
        python -m pip install --upgrade pip setuptools wheel
        
        echo 正在安装 Python 3.8 时代最稳定的 32位 兼容组合...
        :: 这些版本确定有 win32 预编译包，且不需要 Meson 编译环境
        
        :: 1. 先安装基础工具
        python -m pip install threadpoolctl joblib
        
        :: 2. 安装 NumPy 1.19.5 (Python 3.8 32位最稳的版本)
        python -m pip install --only-binary=:all: numpy==1.19.5
        
        :: 3. 安装 SciPy 1.5.4 (这是 32位时代的巅峰版本，完全避开现在的构建错误)
        python -m pip install --only-binary=:all: scipy==1.5.4
        
        :: 4. 安装 Scikit-learn 0.24.2 (极其稳定的版本，完美适配上面的库)
        python -m pip install --only-binary=:all: scikit-learn==0.24.2
        
        :: 5. 安装 Pandas 1.1.5 (Win7 32位推荐版本)
        python -m pip install --only-binary=:all: pandas==1.1.5
        
        :: 6. 安装其他工具
        python -m pip install requests jieba pyinstaller==5.13.2

    - name: Verify Installation
      shell: cmd
      run: |
        echo 验证库是否安装成功...
        python -c "import sklearn; print('Scikit-learn version:', sklearn.__version__)"
        python -c "import pandas; print('Pandas version:', pandas.__version__)"

    - name: Train AI Model
      shell: cmd
      run: |
        echo 开始训练模型...
        python train.py
        
    - name: Build EXE with PyInstaller
      shell: cmd
      run: |
        pyinstaller --noconfirm --onefile --console --clean ^
                    --hidden-import sklearn.neighbors._partition_nodes ^
                    --hidden-import sklearn.utils._cython_blas ^
                    --hidden-import sklearn.utils._typedefs ^
                    --hidden-import sklearn.neighbors._quad_tree ^
                    --hidden-import sklearn.tree._utils ^
                    run.py
        
    - name: Prepare Release Folder
      shell: cmd
      run: |
        mkdir release_package
        copy dist\run.exe release_package\Bili_Downloader.exe
        if exist music_model.pkl copy music_model.pkl release_package\
        :: 下载 32 位专用下载器
        curl -L -o release_package\yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_x86.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bili_Win7_32bit_Ready
        path: release_package\
