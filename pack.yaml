name: Build Win7 Compatible EXE

on:
  workflow_dispatch: # 允许你手动点击按钮触发打包

jobs:
  build:
    # 核心密码：使用 Server 2019 而不是 latest，它的底层依赖更接近 Win7 时代
    runs-on: windows-2019 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.8.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.8.10' # 核心密码：强行降级到兼容 Win7 的最高版本

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装你代码需要的库，外加指定老版本的 pyinstaller 确保兼容性
        pip install requests pandas scikit-learn jieba joblib yt-dlp pyinstaller==5.13.2

    - name: Build EXE with PyInstaller
      run: |
        # -F 代表打包成单文件， -i NONE 取消图标(避免一些奇怪的报错)
        pyinstaller -F run.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: LunchSong-Downloader-Win7
        path: dist/run.exe